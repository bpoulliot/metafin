services:
  metafin:
    image: ghcr.io/bpoulliot/metafin:latest
    container_name: metafin
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - "/path/to/metafin/config:/config"
      # Media mounts must match Jellyfin's container-side paths exactly so that
      # file paths returned by the Jellyfin API are accessible to Metafin.
      # Add one entry per media root, mirroring your Jellyfin volume mounts.
      # Example: if Jellyfin mounts your movies as /media/movies, Metafin must
      # also mount that same host path at /media/movies.
      - "/path/to/media/movies:/media/movies:rw"
      - "/path/to/media/tv:/media/tv:rw"
    ports:
      - "127.0.0.1:7755:7755"
    networks:
      - frontend
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7755/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    mem_limit: 1g
    cpus: 2.0
    restart: unless-stopped
