services:
  xenotag:
    image: ghcr.io/bpoulliot/xenotag:latest
    container_name: xenotag
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - "/path/to/xenotag/config:/config"
      # Media mounts must match Jellyfin's container-side paths exactly so that
      # file paths returned by the Jellyfin API are accessible to Xenotag.
      # Add one entry per media root, mirroring your Jellyfin volume mounts.
      # Example: if Jellyfin mounts your movies as /media/movies, Xenotag must
      # also mount that same host path at /media/movies.
      - "/path/to/media/movies:/media/movies:rw"
      - "/path/to/media/tv:/media/tv:rw"
    ports:
      - "127.0.0.1:7755:7755"
    networks:
      - frontend
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7755/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    mem_limit: 1g  # increase to 2g+ if OOM killed during full scans on large libraries
    cpus: 2.0      # increase for faster ffprobe throughput during scans
    restart: unless-stopped
