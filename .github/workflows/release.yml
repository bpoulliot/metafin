name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump VERSION file
        id: bump
        run: |
          OLD=$(cat VERSION | tr -d '[:space:]')
          IFS='.' read -r MAJOR MINOR PATCH <<< "$OLD"
          case "${{ inputs.bump }}" in
            major) NEW="$((MAJOR + 1)).0.0" ;;
            minor) NEW="${MAJOR}.$((MINOR + 1)).0" ;;
            patch) NEW="${MAJOR}.${MINOR}.$((PATCH + 1))" ;;
          esac
          echo "$NEW" > VERSION
          echo "version=$NEW" >> "$GITHUB_OUTPUT"

      - name: Commit, tag, and push release branch
        run: |
          BRANCH="chore/release-v${{ steps.bump.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add VERSION
          git commit -m "chore: release v${{ steps.bump.outputs.version }}"
          git tag "v${{ steps.bump.outputs.version }}"
          git push origin "$BRANCH"
          git push origin "v${{ steps.bump.outputs.version }}"

      - name: Open VERSION bump PR (auto-merges after CI)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --base main \
            --head "chore/release-v${{ steps.bump.outputs.version }}" \
            --title "chore: release v${{ steps.bump.outputs.version }}" \
            --body "Automated VERSION file bump. Merges automatically once CI passes." \
            --label "automated"
          gh pr merge \
            --head "chore/release-v${{ steps.bump.outputs.version }}" \
            --squash \
            --auto

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.bump.outputs.version }}"
          name: "v${{ steps.bump.outputs.version }}"
          generate_release_notes: true
