name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  lint-and-security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install lint/security tools
        run: pip install ruff black bandit[toml] pip-audit

      - name: Install project dependencies
        run: pip install -r requirements.txt

      - name: Lint (ruff)
        run: ruff check app/

      - name: Format check (black)
        run: black --check app/

      - name: Lint Dockerfile (hadolint)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          failure-threshold: error

      - name: Security scan — Python code (bandit)
        run: bandit -r app/ -ll --exclude app/static

      - name: Security scan — dependencies (pip-audit)
        run: pip-audit -r requirements.txt

  codeql:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: github/codeql-action/init@v3
        with:
          languages: python

      - uses: github/codeql-action/autobuild@v3

      - uses: github/codeql-action/analyze@v3
        with:
          category: "/language:python"

  notify-failure:
    runs-on: ubuntu-latest
    needs: [lint-and-security, docker-build]
    if: failure()
    steps:
      - name: Notify ntfy on failure
        run: |
          curl -s -X POST "https://ntfy.bitmapserv.org/ci" \
            -H "Authorization: Bearer ${{ secrets.NTFY_TOKEN }}" \
            -H "Title: CI Failed — metafin" \
            -H "Tags: x,rotating_light" \
            -H "Priority: high" \
            -H "X-Icon: https://github.githubassets.com/favicons/favicon.png" \
            -d "Workflow: ${{ github.workflow }} failed on ${{ github.ref_name }} (${{ github.event_name }})"

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: xenotag:ci
          build-args: BUILD_VERSION=ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan image for vulnerabilities (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: xenotag:ci
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH
          ignore-unfixed: true
