[tool.ruff]
line-length = 120
target-version = "py312"

[tool.ruff.lint]
select = ["E", "W", "F", "I", "UP", "B", "S"]
ignore = [
    "E501",   # line too long — handled by black/formatter; kept for black compat
    "S101",   # assert — used in test utilities
    "S603",   # subprocess without shell=True — ffprobe calls are safe (no shell)
    "S607",   # partial path for subprocess — ffprobe in PATH
]

[tool.ruff.lint.per-file-ignores]
"app/preview_samples.py" = ["S311"]   # seeded random for deterministic test posters, not crypto

[tool.black]
line-length = 120
target-version = ["py312"]
